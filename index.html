<!doctype html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="時間範囲の計算と、hh:mm・分の相互変換ができるシンプルな時間計算ツールです。" />
    <title>Time Tools — 時間計算ツール</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&family=Noto+Sans+JP:wght@400;500;600;700&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <div class="page-shell">
      <header class="site-header">
        <a class="brand" href="#" aria-label="Time Tools トップ">
          <span class="brand-mark" aria-hidden="true">
            <svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="8.5"/><path d="M12 7.5v5l3.2 2"/></svg>
          </span>
          <span>TIME TOOLS</span>
        </a>
      </header>

      <main>
        <nav class="tool-nav" aria-label="ツールを選択">
          <button class="nav-button active" type="button" data-target="range-panel">
            <span class="nav-number">01</span><span>時間範囲</span>
          </button>
          <button class="nav-button" type="button" data-target="convert-panel">
            <span class="nav-number">02</span><span>時間変換</span>
          </button>
        </nav>

        <section class="tool-panel active" id="range-panel">
          <div class="panel-heading">
            <div><p class="section-number">01</p><h2>時間範囲を計算</h2></div>
            <p>開始と終了の時刻から、経過時間を算出します。</p>
          </div>
          <form id="range-form" class="calculator-form">
            <div class="field-row range-fields">
              <label class="field"><span>開始時刻</span><input id="start-time" type="time" value="09:00" required /></label>
              <span class="range-arrow" aria-hidden="true">→</span>
              <label class="field"><span>終了時刻</span><input id="end-time" type="time" value="17:30" required /></label>
              <label class="field break-field"><span>減算時間 <small>（任意）</small></span><span class="input-suffix"><input id="break-minutes" type="number" value="60" min="0" step="1" inputmode="numeric" /><b>分</b></span></label>
            </div>
            <p class="field-hint">終了時刻が開始時刻より前の場合は、翌日の時刻として計算します。</p>
            <div class="result-card" aria-live="polite">
              <div><p class="result-label">経過時間</p><p class="result-main"><strong id="range-hours">7</strong><span>時間</span><strong id="range-minutes">30</strong><span>分</span></p></div>
              <div class="result-meta"><span>合計 <strong id="range-total">450分</strong></span><span>小数表記 <strong id="range-decimal">7.50時間</strong></span></div>
            </div>
          </form>
        </section>

        <section class="tool-panel" id="convert-panel" hidden>
          <div class="panel-heading">
            <div><p class="section-number">02</p><h2>時間を変換</h2></div>
            <p>「hh:mm」と「mm」を相互に変換します。</p>
          </div>
          <form id="convert-form" class="converter-card">
            <p class="converter-type">HH:MM <span>⇄</span> MINUTES</p>
            <div class="converter-fields">
              <label class="field">
                <span>時間 : 分</span>
                <input id="convert-time" type="text" value="02:30" inputmode="numeric" placeholder="02:30" aria-describedby="time-error" />
              </label>
              <span class="convert-mark" aria-hidden="true">⇄</span>
              <label class="field">
                <span>分</span>
                <span class="input-suffix"><input id="convert-minutes" type="number" value="150" min="0" step="1" inputmode="numeric" /><b>分</b></span>
              </label>
            </div>
            <p class="error-message" id="time-error"></p>
            <p class="converter-hint">どちらの欄からでも入力できます。</p>
          </form>
        </section>
      </main>
    </div>
    <script src="script.js"></script>
  </body>
</html>
